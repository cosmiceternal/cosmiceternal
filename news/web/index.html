<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News Wall — Political &amp; Financial Live Stations</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <span class="logo-dot live"></span>
      <h1>NEWS&nbsp;WALL</h1>
      <span class="sub">Live political &amp; financial stations</span>
    </div>
    <div class="controls">
      <div class="filters" role="tablist" aria-label="Filter stations">
        <button class="filter active" data-kind="all">All</button>
        <button class="filter" data-kind="political">Political</button>
        <button class="filter" data-kind="financial">Financial</button>
      </div>
      <button id="refreshAll" class="refresh-all" title="Refresh every station">⟳ Refresh all</button>
      <span id="clock" class="clock"></span>
    </div>
  </header>

  <p class="hint">Hover a station to magnify it · click to keep it open</p>

  <!-- The grid of live station tiles is built by app.js -->
  <main id="wall" class="wall" aria-label="Station grid"></main>

  <footer class="foot">
    <span id="status">Starting…</span>
    <span class="foot-note">Headlines from public RSS feeds · runs locally on your computer</span>
  </footer>

  <!-- Click-to-open reader. Stays open until closed. -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Station reader">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div class="modal-kicker"><span class="logo-dot live"></span><span id="modalSection"></span></div>
          <h2 id="modalTitle"></h2>
        </div>
        <div class="modal-actions">
          <button id="modalRefresh" class="icon-btn" title="Refresh">⟳</button>
          <button id="modalClose" class="icon-btn" title="Close (Esc)">✕</button>
        </div>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
