[env:esp32-s3-devkitc-1]
; Pinned to the 6.x platform line (arduino-esp32 2.0.x core), which uses the
; classic ledcSetup/ledcAttachPin LEDC API that heater_control.cpp targets.
; arduino-esp32 3.x changed that API (ledcAttach(pin, freq, res)) — bump the
; platform version and heater_control.cpp together if you upgrade.
platform = espressif32@6.9.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=2
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit GFX Library@^1.11.9
