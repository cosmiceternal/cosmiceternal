<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEONSTAKE — Provably Fair Casino</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%2220%22 font-size=%2222%22>♠</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">NEON<span class="accent">STAKE</span></span>
    </div>
    <nav class="game-tabs" id="gameTabs">
      <button class="tab active" data-game="crash">Crash</button>
      <button class="tab" data-game="mines">Mines</button>
      <button class="tab" data-game="plinko">Plinko</button>
      <button class="tab" data-game="dice">Dice</button>
    </nav>
    <div class="wallet">
      <div class="balance">
        <span class="balance-label">Balance</span>
        <span class="balance-value" id="balanceValue">0.00</span>
        <span class="balance-unit">USD</span>
      </div>
      <button class="btn btn-ghost" id="btnFair" title="Provably Fair">Fair</button>
      <button class="btn btn-ghost" id="btnReset" title="Reset balance to 1000">Reset</button>
    </div>
  </header>

  <main class="layout">
    <section class="game-pane" id="gamePane">
      <!-- Game injected here -->
    </section>

    <aside class="feed-pane">
      <div class="feed-header">
        <h3>Live Bets</h3>
        <div class="feed-tabs">
          <button class="feed-tab active" data-feed="all">All Bets</button>
          <button class="feed-tab" data-feed="high">High Rollers</button>
          <button class="feed-tab" data-feed="me">My Bets</button>
        </div>
      </div>
      <div class="feed-table-head">
        <span>Game</span><span>Player</span><span>Bet</span><span>Mult</span><span>Payout</span>
      </div>
      <ul class="feed-list" id="feedList"></ul>
    </aside>
  </main>

  <!-- Provably Fair Modal -->
  <div class="modal-backdrop hidden" id="fairModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Provably Fair</h2>
        <button class="btn btn-ghost" id="fairClose">✕</button>
      </div>
      <div class="modal-body">
        <p class="muted">
          Each bet is generated by HMAC-SHA256(<em>server seed</em>, <em>client seed</em>:<em>nonce</em>).
          The server seed is committed (hashed) before play. Rotate the seed to reveal the original and verify all past rounds.
        </p>
        <div class="kv">
          <label>Server Seed Hash <small>(committed)</small></label>
          <input id="fairServerHash" readonly />
        </div>
        <div class="kv">
          <label>Server Seed <small>(revealed after rotation)</small></label>
          <input id="fairServerSeed" readonly placeholder="hidden until rotated" />
        </div>
        <div class="kv">
          <label>Client Seed</label>
          <input id="fairClientSeed" />
        </div>
        <div class="kv">
          <label>Nonce</label>
          <input id="fairNonce" readonly />
        </div>
        <div class="row">
          <button class="btn btn-primary" id="fairRotate">Rotate Server Seed</button>
          <button class="btn btn-ghost" id="fairUpdateClient">Update Client Seed</button>
        </div>
        <div class="fair-history">
          <h4>Recent Rolls</h4>
          <ul id="fairHistory"></ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-stack" id="toasts"></div>

  <!-- Modules -->
  <script src="js/fair.js"></script>
  <script src="js/bankroll.js"></script>
  <script src="js/feed.js"></script>
  <script src="js/games/crash.js"></script>
  <script src="js/games/mines.js"></script>
  <script src="js/games/plinko.js"></script>
  <script src="js/games/dice.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
