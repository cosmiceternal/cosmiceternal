name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (dead code / undeclared names)
        run: npm run lint
      - run: npm test
      - name: Syntax-check client bundles
        run: for f in public/js/*.js public/js/games/*.js; do node --check "$f"; done
