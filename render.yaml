# Render blueprint — https://render.com
# ONE-TIME LAUNCH: click the "Deploy to Render" button in the README, sign in,
# and hit Apply. Render provisions a PostgreSQL database + this web service and
# gives you a public HTTPS URL.
#
# AFTER LAUNCH you never need GitHub or a terminal again:
#   - autoDeploy below means every change merged to main goes live on its own
#     within a couple of minutes.
#   - All day-to-day settings (admin username, AI key, CoinPayments) are plain
#     environment variables in the Render dashboard → your service →
#     Environment tab.

databases:
  - name: cryptcasino-db
    plan: free
    databaseName: cryptcasino
    user: cryptcasino

services:
  - type: web
    name: crypt-casino
    runtime: node
    plan: free
    autoDeploy: true
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      # Persistent Postgres connection (data survives restarts/sleep).
      - key: DATABASE_URL
        fromDatabase:
          name: cryptcasino-db
          property: connectionString
      # Auto-generated, stable secret so sessions survive restarts.
      - key: SESSION_SECRET
        generateValue: true
      # Render serves the public URL over HTTPS, so require secure cookies.
      - key: SECURE_COOKIES
        value: "1"
      - key: NODE_VERSION
        value: "20"
      # ----- Your admin account -----
      # Fill this in with the username you register in the casino: that account
      # gets the ⚡ Admin console (users, balances, locks, withdrawals).
      - key: ADMIN_USERNAME
        sync: false
      # ----- Optional: live AI dealer banter -----
      # Set ANTHROPIC_API_KEY to enable Claude-driven AI Dealer lines (falls
      # back to the built-in scripted persona library when unset).
      - key: ANTHROPIC_API_KEY
        sync: false
      # ----- Crypto vault -----
      # 'playmoney' settles deposits/withdrawals in-app (no real funds). Swap
      # to 'coinpayments' once the COINPAYMENTS_* vars are filled and your IPN
      # URL points at https://<your-render-url>/api/vault/webhook.
      - key: VAULT_PROCESSOR
        value: playmoney
      - key: DAILY_DEPOSIT_CAP_CRYPT
        value: "5000"
      - key: DAILY_WITHDRAW_CAP_CRYPT
        value: "5000"
      # ----- CoinPayments (fill in the dashboard when you go real-money) -----
      # https://www.coinpayments.net/acct-api-keys
      - key: COINPAYMENTS_KEY
        sync: false
      - key: COINPAYMENTS_SECRET
        sync: false
      - key: COINPAYMENTS_IPN_SECRET
        sync: false
      - key: COINPAYMENTS_MERCHANT_ID
        sync: false
      # Optional override; defaults to your Render URL + /api/vault/webhook.
      - key: COINPAYMENTS_IPN_URL
        sync: false

# Notes:
# - Free tier: the web service sleeps when idle (first hit ~30s to wake) and
#   the free Postgres has a limited lifetime (Render emails you before it
#   expires). For a real launch, upgrade the web service to Starter and the
#   database to Basic in the dashboard — no code changes needed.
# - Custom domain: dashboard → your service → Settings → Custom Domains, add
#   yourdomain.com, create the CNAME record it shows you. HTTPS is automatic.
